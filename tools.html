<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools - Saanvi's Website</title>
<style>
body { font-family: sans-serif; background: #fff; color: #5b4636; text-align: center; padding: 20px; }

.tool-list { list-style: none; padding: 0; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
.tool-list li { background: #f7f1e3; border-radius: 16px; padding: 25px; width: 250px; transition: transform 0.4s, box-shadow 0.4s; box-shadow: 0 8px 15px rgba(0,0,0,0.15);}
.tool-list li:hover { transform: translateY(-10px) rotateX(2deg); box-shadow: 0 15px 25px rgba(0,0,0,0.25); background: #fff4e0; }
.tool-list li a { text-decoration: none; color: #5b4636; font-weight: bold; font-size: 1.2em; display: block; margin-bottom: 10px; }
.tool-list li p { margin: 0; font-size: 1em; }

.search-box { margin: 25px 0; }
.search-box input { width: 80%; padding: 12px; border-radius: 12px; font-size: 1.2em; }
</style>
</head>
<body>

<h2>Explore Useful Tools</h2>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search tools..." onkeyup="filterTools()">
</div>

<h3>Productivity & Learning</h3>
<ul class="tool-list" id="toolListProductivity">
<li>🖩 <a href="https://www.google.com/search?q=calculator" target="_blank">Calculator</a><p>Quick online calculations</p></li>
<li>📓 <a href="https://www.notion.so" target="_blank">Notion</a><p>Notes, tasks, projects</p></li>
</ul>

<h3>Design & Utilities</h3>
<ul class="tool-list" id="toolListDesign">
<li>🎨 <a href="https://www.canva.com" target="_blank">Canva</a><p>Create posters, presentations & graphics</p></li>
<li>🖌️ <a href="https://www.figma.com" target="_blank">Figma</a><p>UI/UX design and prototyping</p></li>
</ul>

<script>
function filterTools() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    [document.getElementById('toolListProductivity'), document.getElementById('toolListDesign')].forEach(list => {
        list.querySelectorAll('li').forEach(item => {
            let text = item.querySelector('a').textContent.toLowerCase();
            item.style.display = text.includes(input) ? '' : 'none';
        });
    });
}
</script>

</body>
</html>

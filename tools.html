<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saanvi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1, h2 {
            text-align: center;
        }
        .tool-list {
            list-style-type: none;
            padding: 0;
        }
        .tool-list li {
            background-color: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>Saanvi's Tools</h1>
    </header>
    <main>
        <h2>Useful Tools</h2>
        <ul class="tool-list">
            <li>Tool 1: Description here</li>
            <li>Tool 2: Description here</li>
            <li>Tool 3: Description here</li>
            <li>Tool 4: Description here</li>
        </ul>
    </main>
</body>
</html>
